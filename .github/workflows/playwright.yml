name: Playwright Tests
on:
  push:
    branches: [ main, beta ]
  pull_request:
    branches: [ main, beta ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4 # Aggiornato a v4

    - name: Setup Node
      uses: actions/setup-node@v4 # Aggiornato a v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm i && cd api && npm i && cd ../frontend && npm i && cd ../

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4 # SOLUZIONE: Aggiornato a v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
