name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/double-take

jobs:

# =========================
# 🟦 AMD64 (veloce)
# =========================
  build-amd64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build amd64
      uses: docker/build-push-action@v6 # Aggiornato a v6 (stabile)
      with:
        context: .
        file: .build/Dockerfile
        push: true
        platforms: linux/amd64
        tags: ${{ env.DOCKER_IMAGE }}:amd64-${{ github.sha }}
        cache-from: type=gha,scope=amd64
        cache-to: type=gha,mode=max,scope=amd64,compression=zstd

# =========================
# 🟩 ARM64 (nativo runner)
# =========================
  build-arm64:
    runs-on: ubuntu-24.04-arm # Ottima scelta per la velocità nativa
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build arm64
      uses: docker/build-push-action@v6
      with:
        context: .
        file: .build/Dockerfile
        push: true
        platforms: linux/arm64
        tags: ${{ env.DOCKER_IMAGE }}:arm64-${{ github.sha }}
        cache-from: type=gha,scope=arm64
        cache-to: type=gha,mode=max,scope=arm64,compression=zstd

# =========================
# 🟨 ARMv7 (unica con QEMU)
# =========================
  build-armv7:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # Aggiornato da v6.0.2 (non esistente) a v4
    - uses: docker/setup-qemu-action@v3 # Semplificato a v3
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build armv7
      uses: docker/build-push-action@v6
      with:
        context: .
        file: .build/Dockerfile
        push: true
        platforms: linux/arm/v7
        tags: ${{ env.DOCKER_IMAGE }}:armv7-${{ github.sha }}
        cache-from: type=gha,scope=armv7
        cache-to: type=gha,mode=max,scope=armv7,compression=zstd

# =========================
# 🧾 MANIFEST MULTI-ARCH
# =========================
  manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64, build-armv7]
    steps:
    - uses: docker/setup-buildx-action@v3 # Necessario per imagetools
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Create and push manifest
      run: |
        docker buildx imagetools create \
          -t ${{ env.DOCKER_IMAGE }}:latest \
          -t ${{ env.DOCKER_IMAGE }}:sha-${GITHUB_SHA::7} \
          ${{ env.DOCKER_IMAGE }}:amd64-${{ github.sha }} \
          ${{ env.DOCKER_IMAGE }}:arm64-${{ github.sha }} \
          ${{ env.DOCKER_IMAGE }}:armv7-${{ github.sha }}