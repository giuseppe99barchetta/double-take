name: Build and Push Docker Image

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/double-take

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target: ['']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - id: lowercaseRepo
      uses: ASzc/change-string-case-action@v6
      with:
        string: ${{ github.repository }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    # 🏷️ Tag management
    - name: Create short sha and tag
      shell: bash
      run: |
        echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
        if [[ "$GITHUB_REF" == "refs/heads/beta" ]]; then
          echo "TAG=beta" >> $GITHUB_ENV
        else
          echo "TAG=latest" >> $GITHUB_ENV
        fi

    # 🧾 Metadata for Docker tags
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ steps.lowercaseRepo.outputs.lowercase }}
          ${{ env.DOCKER_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=pep440,pattern={{version}}
          type=pep440,pattern={{major}}.{{minor}}
          type=pep440,pattern={{major}}
          type=sha,enable=${{ matrix.target != '' }},prefix=,suffix=-${{ matrix.target }},format=short
          type=sha,enable=${{ matrix.target == '' }},prefix=sha-,suffix=,format=short
        flavor: |
          latest=${{ matrix.target == '' && github.ref == 'refs/heads/main' }}
          suffix=${{ matrix.target }}

    # 🐳 Build & push multi-arch
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: .build/Dockerfile
        target: ${{ matrix.target }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 📄 Sync README to Docker Hub
    - name: Sync README to Docker Hub
      uses: ms-jpq/sync-dockerhub-readme@v1
      if: github.ref == 'refs/heads/beta'
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
        repository: ${{ env.DOCKER_IMAGE }}
        readme: "./README.md"